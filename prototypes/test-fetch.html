<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>You Tapped a Goodz — Fetch Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --spotify-green: #1DB954;
      --spotify-black: #191414;
      --text-light: #ffffff;
      --text-muted: rgba(255,255,255,0.7);
    }
    html, body { height: 100%; font-family: sans-serif; background: #0a0a0a; color: var(--text-light); overflow: hidden; }

    #bg {
      position: fixed; inset: 0;
      background: url('https://i.scdn.co/image/ab67706f00000002990c5b8e14c26d8f9ce7211f') center/cover no-repeat;
      filter: blur(20px) brightness(0.45);
      transform: scale(1.08);
      opacity: 0;
    }
    #bg.revealed { animation: artReveal 1.4s cubic-bezier(0.22,1,0.36,1) forwards; }
    @keyframes artReveal {
      0%   { transform: scale(1.12); filter: blur(24px) brightness(0.4); opacity: 0; }
      100% { transform: scale(1.0);  filter: blur(0px)  brightness(1.0);  opacity: 1; }
    }

    #overlay {
      position: fixed; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.3) 40%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
    }

    #loading {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      background: #0a0a0a;
      transition: opacity 0.5s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loader {
      width: 48px; height: 48px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--spotify-green);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #content {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
      height: 100%; padding: 2rem 1.5rem 4rem; text-align: center;
    }

    #artwork {
      width: 200px; height: 200px; border-radius: 50%;
      background: url('https://i.scdn.co/image/ab67706f00000002990c5b8e14c26d8f9ce7211f') center/cover no-repeat;
      box-shadow: 0 0 80px rgba(0,0,0,0.7);
      opacity: 0; transform: scale(0.6);
    }
    #artwork.revealed { animation: artworkReveal 1.2s cubic-bezier(0.22,1,0.36,1) 0.3s forwards; }
    @keyframes artworkReveal {
      0%   { opacity: 0; transform: scale(0.5); }
      60%  { opacity: 1; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1.0); }
    }

    #title-group { opacity: 0; transform: translateY(16px); margin-bottom: 2rem; max-width: 360px; }
    #title-group.revealed { animation: fadeUp 0.8s ease 1.0s forwards; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    #playlist-title { font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 700; margin-bottom: 0.4rem; text-shadow: 0 2px 16px rgba(0,0,0,0.6); }
    #playlist-description { font-size: 0.85rem; color: var(--text-muted); }

    #actions { opacity: 0; transform: translateY(12px); display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
    #actions.revealed { animation: fadeUp 0.7s ease 1.4s forwards; }

    .btn-spotify {
      display: inline-flex; align-items: center; gap: 0.6rem;
      background: var(--spotify-green); color: var(--spotify-black);
      font-weight: 700; font-size: 1rem; padding: 0.85rem 2rem;
      border-radius: 999px; text-decoration: none;
      box-shadow: 0 4px 24px rgba(29,185,84,0.35);
    }

    .btn-change { font-size: 0.78rem; color: var(--text-muted); text-decoration: underline; cursor: pointer; background: none; border: none; padding: 0.25rem; }
  </style>
</head>
<body>
  <div id="loading"><div class="loader"></div></div>
  <div id="bg" class="revealed"></div>
  <div id="overlay"></div>
  <div id="content">
    <div id="artwork" class="revealed"></div>
    <div id="title-group" class="revealed">
      <div id="playlist-title">Today's Top Hits</div>
      <div id="playlist-description">Tap to listen on Spotify</div>
    </div>
    <div id="actions" class="revealed">
      <a class="btn-spotify" href="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M?utm_source=generator" target="_blank">
        Listen Now
      </a>
      <button class="btn-change">Change playlist</button>
    </div>
  </div>

  <script>
    // Test: does fetch work at all from this domain?
    var t0 = Date.now();
    fetch('https://open.spotify.com/oembed?url=https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        console.log('Fetch OK:', d.title, 'in', Date.now() - t0, 'ms');
        document.getElementById('loading').classList.add('hidden');
      })
      .catch(function(e) {
        console.warn('Fetch failed:', e.message, 'after', Date.now() - t0, 'ms');
        document.getElementById('loading').classList.add('hidden');
      });
  </script>
</body>
</html>
